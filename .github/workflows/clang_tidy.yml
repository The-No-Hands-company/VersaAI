name: Clang-Tidy

on:
  pull_request:
    branches: [ main, develop ]
    paths:
      - '**.cpp'
      - '**.hpp'
      - '**.c'
      - '**.h'
      - '**.cc'
      - '**.cxx'
      - '**.hxx'

jobs:
  clang-tidy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          ninja-build \
          libx11-dev \
          libxcursor-dev \
          libxi-dev \
          libgl1-mesa-dev \
          libfontconfig1-dev \
          clang-12 \
          clang-tidy-12

    - name: Configure CMake
      run: |
        cmake -B ${{github.workspace}}/build \
              -DCMAKE_BUILD_TYPE=Debug \
              -DCMAKE_C_COMPILER=clang-12 \
              -DCMAKE_CXX_COMPILER=clang++-12 \
              -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
              -G Ninja

    - name: Get changed files
      id: changed-files
      uses: tj-actions/changed-files@v44
      with:
        files: |
          **.cpp
          **.hpp
          **.c
          **.h
          **.cc
          **.cxx
          **.hxx

    - name: Run clang-tidy on changed files
      if: steps.changed-files.outputs.any_changed == 'true'
      run: |
        echo "Running clang-tidy on changed files:"
        echo "${{ steps.changed-files.outputs.all_changed_files }}"
        
        # Build first to generate necessary headers
        cmake --build ${{github.workspace}}/build --config Debug
        
        # Run clang-tidy on changed files only
        for file in ${{ steps.changed-files.outputs.all_changed_files }}; do
          echo "Checking $file"
          clang-tidy-12 "$file" \
            -p ${{github.workspace}}/build \
            --format-style=file \
            --warnings-as-errors=* || exit 1
        done

    - name: Create review comment
      if: failure()
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.pulls.createReview({
            owner: context.repo.owner,
            repo: context.repo.repo,
            pull_number: context.issue.number,
            body: 'Clang-tidy found issues in the code. Please fix them before merging.',
            event: 'REQUEST_CHANGES'
          });

  format-check:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install clang-format
      run: |
        sudo apt-get update
        sudo apt-get install -y clang-format-12

    - name: Check formatting
      run: |
        find . -name "*.cpp" -o -name "*.hpp" -o -name "*.c" -o -name "*.h" \
               -o -name "*.cc" -o -name "*.cxx" -o -name "*.hxx" | \
        xargs clang-format-12 --dry-run --Werror --style=file
